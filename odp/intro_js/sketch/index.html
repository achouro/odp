<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <link href="style.css" rel="stylesheet">
  <title>Etch-A-Sketch</title>
</head>

<body>
  <h1>Etch-A-Sketch</h1>
  <p><welcome>Welcome to Etch-A-Sketch!</welcome></p>
  <p>You can create fantastic drawings simply by hovering around the board with your cursor.</p>

  <label for="size">Please select a grid size:</label>
  <select id="size">
    <option id="16" value=16>16x16</option>
    <option id="32" value=32>32x32</option>
    <option id="64" value=64>64x64</option>
  </select>
  
  <div id="output"></div>
  <script src="script.js"></script>
</body>

</html>
