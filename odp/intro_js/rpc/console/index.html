<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissor</title>
    <link href="style.css" rel="stylesheet">
  </head>

  <body>
    <div class="intro">
    <h1>Rock Paper Scissors</h1>

    <h3>Game On!</h3>
    
    <li>
      <label for="play">Press play to start the game:</label>
      <button  id="play">Play</button>
    </li>
    

    <p>The computer cannot see your hand.</p>
    <p></p>
      
    </div>

    
    <div class="game">
    <label for="choice">Please select your move:</label>
    
    <ul id="buttons">
      <li style="list-style-type:none"><button id="Rock" class="choice">Rock</button></li>
      <li style="list-style-type:none"><button id="Paper" class="choice">Paper</button></li>
      <li style="list-style-type:none"><button id="Scissors" class="choice" >Scissors</button></li>
    </ul>
    <br></br>
    <div class="round_score"></div>
    <div class="round_winner"></div>
    <br></br>
    <div class="final_score"></div>
    <div class="game_winner"></div>

    </div>
  <script src="script1.js"></script>
    
  </body>
</html>
