//ex6: repeat three times
function repeat_string(str,num){
    rep=[]
    for(i=0; i<num;i++){
        rep.push(str);
    }
    return rep.join("");
}

//ex7 reverse
function reverse_string(str){
    rev=[]
    for(let i=0; i<str.length;i++){
        
        rev.push(str.charAt(str.length -1 -i));
        }
    return rev.join("");
}

//ex8 remove
function remove_from(array,element){
    ret=[]
    for(let i=0; i<array.length;i++){
        if(array[i]===element){continue;}
        ret.push(array[i]);
        }
    return ret;
}

//ex9 sum
function sum_all(a, b){
    var summer=0
    for(let i=a; i<=b;i++){
        summer+= i; 
        
    }
    return summer;
}

//ex10 is_leap_year
function is_leap_year(annum){
    
    if(annum%4 === 0 && (annum%100!==0 || annum%400===0)) {return true; } 
    
    else {return false};
}

//ex11 temp conversion
    
function convert_to_fahrenheit(fahren){
    return Math.round((fahren-32)/1.8,2);
}
console.log(convert_to_fahrenheit(100))

function convert_to_celcius(cel){
    return Math.round(cel*1.8 + 32 ,2);
}
