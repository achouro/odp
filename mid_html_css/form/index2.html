<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Welcome to our shop:</h1>
    <p style="font-weight: 600;">Please enter your item of choice to set up delivery:</p>
    <form method="post">
    <div>
            <label for="ID">Your ID:</label>
            <input type="text" id="ID" name="ID">
    </div> 
    <div>
            <label for="item">Item name:</label>
            <input type="text" id="item" name="item">
        </div>
        <div>
            <label for="quantity">Quantity :</label>
            <input type="number" id="quantity" name="quantity">
        </div>
        <div>
            <label for="date">Delivery date:</label>
            <input type="date" id="date" name="date"></input>
        </div>
        <br>
        <div>
            <label for="details">Specific requests:</label>
            <br/>
            <textarea id="details" rows="10" cols="20" placeholder="Leave a comment for extra details."></textarea>
        </div>
        <br>
        <button type="submit" class="button">Send request</button>
    </form>
    <div class="message"></div>
    <script src="script2.js"></script>

</body>
</html>
