<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Signup | Wellness Studio</title>
</head>
<body>
    <div class="image">
        <img src="image.jpg" alt="Photo by Eliezer Fernandez on https://www.unspash.com/">
        <div class="credit"></div>
    </div>
    <div class="page">
        <div class="intro">
            <h1>Wellness Studio</h1>
            <p class="welcome">Welcome to our health and wellness studio! Sign-up to start you journey.</p>
        </div>
        <form>
            <div class="form">
            
                <div class="item">
                    <label for="first_name">First Name</label>
                    <br>
                    <input type="text" id="first_name" name="first_name" required>
                    
                </div>
                <div class="item">
                    <label for="last_name">Last Name</label>
                    <br>
                    <input type="text" id="last_name" name="last_name" required>
                </div>
                <div class="item">
                    <label for="email">E-mail Address</label>
                    <br>
                    <input type="email"  id="email" name="email" required>
                </div>
                <div class="item">
                    <label for="phone">Phone Number</label>
                    <br>
                    <input type="number" minlength="8" maxlength="12" id="phone" name="phone" required>
                </div>
                <div class="item">
                    <label for="password">Password</label>
                    <br>
                    <input type="password"  minlength="8" id="password" name="password" required>
                </div>
                <div class="item">
                    <label for="confirm_password">Confirm Password</label>
                    <br>
                    <input type="password"  minlength="8" id="confirm_password" name="confirm_password" required>
                </div>
            </div>
        <br>
        <div class="buttons">
            <button type="submit">Create account</button>
            <div><p>Already have an account? <a>Sign-in</a></p></div>

        </div>
        </form>
    </div>
    
        
</body>
</html>
