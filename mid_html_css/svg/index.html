<!DOCTYPE html>
<head>

<body>

    <div class="first">
        <div class="container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <rect x="0" y="0" width="100" height="100" fill="burlywood"></rect>
                <path d="M 10 10 H 90 V 90 L 10 60
                         M 15 15 V 45 " fill="transparent" stroke="black" stroke-width="3"></path>
                <circle cx="50" cy="50" r="20" class="svg-circle"/>
                    <g class="svg-text-group">
                        <text x="20" y="25" rotate="10" id="hello-text">Hello!</text>
                        <use href="#hello-text" x="-10" y="65" fill="white"/>
                    </g>
            </svg>
        </div>
    </div>



    <div class="second">
        <div class="container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <rect x="0" y="0" width="100" height="100" fill="lightgrey"></rect>
                <path d="M 10 30 
                        A 20, 20 0, 0, 1 50, 30 Z
                        M 90 70
                        A 20, 20 0, 0, 1 50, 70 Z
                        M 30 50
                        H 10 V 80 H 40 
                        M 70 50
                        H 90 V 20 H 60" 
                        fill="transparent" stroke="black" stroke-width="3"></path>

                <circle cx="50" cy="50" r="20" fill="yellow" class="mycircle"/>


                    <g class="svg-text-group">
                        <text x="20" y="25" rotate="10" id="hello-text"></text>
                    </g>
            </svg>
        </div>
    </div>
<div class="container third">

    <svg width="200" height="200">
        <rect width="200" height="200" fill="black"/>
            <line x1="80" y1="80" x2="160" y2="160" stroke= "oklch(0.9 0.3 164)" stroke-width="5"/>
            <line x1="120" y1="80" x2="60" y2="160" stroke= "oklch(0.9 0.3 164)" stroke-width="5"/>

            <rect x="60" y="100" width="100" height="80" stroke= "grey" stroke-width="5"/>
                <rect x="120" y="120" width="20" height="20"
                      rx="10" ry="10" cx="100"
                         stroke= "orange" stroke-width="5"/>
            <polygon points="80,120 80, 140 100,140 100,120" stroke= "blue" stroke-width="5"/>
            <polygon points="70,150 80,160 140,160  150,150 " stroke= "green" stroke-width="5"/>
        
    </svg>

    
</div>
