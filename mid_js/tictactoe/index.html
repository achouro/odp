<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="whole">
        <div class="info">
            <div class="top">
                <div class="background">
                    <h1 class="banner">Welcome to <span class="tic">Tic</span><span class="tac">Tac<span class="toe">Toe!</span><span class="e"></span></h1>
                </div>
                <div class=message><h3>Start a game by marking the grid!</h3></div>
                
            </div>
            <div class="players">
                <div class="player one">
                    <img class="X" src="images/X.png">
                    <div class="text">&nbspPlayer 1: &nbsp</div>
                    <div class="score one">0</div>
                    
                </div>

                <div class="winner">
                    <img src="images/firework.png">
                    <div class="game_winner"></div>
                    <div class="text">&nbspwins!</div>
                    <img src="images/firework.png">
                </div>
                
                <div class="player two">
                    <div class="score two">0</div>
                    <div class="text">&nbsp :Player 2&nbsp</div>
                    <img class="O" src="images/O.png">
                </div>
            </div>


        </div>

        <div class="board"></div>

        <div class="bottom">
            <div class="buttons">
                <h4><div class="turn">Turn:&nbsp<div class="player turn">Player 1</div></h4>

                <button class="next">Next</button>
                <button class="reset">Reset</button>
            </div>
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
