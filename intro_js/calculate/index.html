<!DOCTYPE html>
<HEAD>
    <meta charset="UTF-8">
    <link href="style.css" rel="stylesheet">
    <title>Calculator</title>
</HEAD>

<BODY>
    <h1>Calculator</h1>
    <h3>Press entries to calculate:</h3>
    
    <div class="whole">
        
        <div class="screen">
            <div class="reset" style="font-size:12px;">R</div>
            <div class="input"></div>
            
        </div>
        
        
        
        <div class="entries">
            
            <div class="functional">
        
            </div>

            <div class="operational" style="display:flex; flex-direction:row; ">
                <div class="numbers">
                    
                    <div class="number" id="1">1</div>
                    <div class="number" id="2">2</div>
                    <div class="number" id="3">3</div>
                    <div class="number" id="4">4</div>
                    <div class="number" id="5">5</div>
                    <div class="number" id="6">6</div>
                    <div class="number" id="7">7</div>
                    <div class="number" id="8">8</div>
                    <div class="number" id="9">9</div>
                    <div class="number" id="0">0</div>
                    <div class="number" id=".">.</div>
                    <div class="number" id="equal">=</div>

                </div>
                <div class="operators">
                    <div class="operator" id="add">+</div>
                    <div class="operator" id="subtract">-</div>
                    <div class="operator" id="multiply">*</div>
                    <div class="operator" id="divide">/</div>
                    
                    
                </div>
            </div>
            
        </div>
    </div>
    
    
    <script src="script.js"></script>
</BODY>

</html>
