<!DOCTYPE html>
<script>
let arr = [1, 2, 3, 4, 5,6 ]


function shuffle(arrayin){
    
    var array= arrayin.slice()
    
    for(i=0;i < array.length; i++){
        //pick random item in a list
        const rand= Math.floor(Math.random()*(array.length))
        
        //swap with ith element
        temp=array[i];
        array[i]= array[rand];
        array[rand]=temp;
        temp=null;
    }
    
    return array
}
